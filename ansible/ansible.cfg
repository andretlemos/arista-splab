[defaults]
inventory = ./netbox-inventory.yml
roles_path = ./roles
gathering = explicit
host_key_checking = False
retry_files_enabled = False
collections_path = ~/.ansible/collections
deprecation_warnings = False
var_name_warning = False
force_valid_group_names = always
forks = 10
strategy = free


[inventory]
enable_plugins = netbox.netbox.nb_inventory
ignore_invalid_hostnames = True
