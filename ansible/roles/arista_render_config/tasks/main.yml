- name: Create Configs Directory
  ansible.builtin.file:
    path: configs
    state: directory
  delegate_to: localhost
  run_once: true

- name: Generate Arista Configs
  ansible.builtin.template:
    src: templates/arista_ceos.j2
    dest: configs/{{ inventory_hostname }}.eos    
    trim_blocks: true
    lstrip_blocks: true
  delegate_to: localhost  

  
  