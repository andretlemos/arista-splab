ip routing
ipv6 unicast-routing
mpls ip
!
hostname PE1
!
ntp server 200.160.0.8 source Loopback0
ntp server 2001:12f8:9:1::8 source Loopback0
ntp server 200.189.40.8 source Loopback0
ntp server 2001:12f8:b:1::8 source Loopback0
!
ip name-server 9.9.9.9
ip name-server 1.1.1.1
ip name-server 8.8.8.8
!

router ospf 1
  router-id  192.168.101.1
  passive-interface Loopback0
!


!
interface Ethernet1
 no switchport
 ip address 10.0.1.1/31
 ipv6 address 2001:db8:0:1::1/127
 ip ospf 1 area 0
 
 ip ospf network point-to-point
!
interface Ethernet2
 no switchport
 ip address 192.168.1.0/31
 ipv6 address 2001:db8:10:1::/127
!
interface Loopback0
 ip address 192.168.101.1/24
 ipv6 address 2001:db8:cafe:1::1/64
 ip ospf 1 area 0
!
!